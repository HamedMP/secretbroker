name: Bug report
description: Report a reproducible SecretBroker problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Never include real credentials, secret fragments, authenticated URLs, or private request metadata.
  - type: input
    id: version
    attributes:
      label: SecretBroker version
      placeholder: secretbroker 0.1.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction using synthetic values only
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
