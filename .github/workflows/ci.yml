name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features

  msrv:
    name: Minimum supported Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.100.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-features

  npm-launcher:
    name: npm launcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/npm/package-lock.json
      - run: cargo build
      - run: npm ci
        working-directory: packages/npm
      - run: npm test
        working-directory: packages/npm
        env:
          SECRETBROKER_BINARY: ${{ github.workspace }}/target/debug/secretbroker

  agent-skill:
    name: Agent skill
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: node scripts/check-agent-package.mjs
      - name: Check package versions
        run: |
          version=$(node -p "require('./packages/npm/package.json').version")
          node scripts/check-release-version.mjs "v$version"
      - name: Test skills.sh installation layout
        run: |
          workdir="$(mktemp -d)"
          cd "$workdir"
          git init --quiet
          npx -y skills@1.5.19 add "$GITHUB_WORKSPACE" --skill secretbroker --agent pi claude-code codex --yes --copy
          test -f .pi/skills/secretbroker/SKILL.md
          test -f .claude/skills/secretbroker/SKILL.md
          test -f .agents/skills/secretbroker/SKILL.md
          test -f .agents/skills/secretbroker/agents/openai.yaml
          test -f .agents/skills/secretbroker/evals/evals.json

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - run: cargo audit
      - run: cargo deny check
