name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v-prefixed tag to release
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - id: version
        shell: bash
        run: |
          tag="${{ inputs.tag || github.ref_name }}"
          node scripts/check-release-version.mjs "$tag"
          node scripts/check-agent-package.mjs
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features --locked
      - run: cargo build --locked
      - run: npm ci
        working-directory: packages/npm
      - run: npm test
        working-directory: packages/npm
        env:
          SECRETBROKER_BINARY: ${{ github.workspace }}/target/debug/secretbroker

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
            binary: secretbroker
          - runner: macos-14
            target: x86_64-apple-darwin
            platform: darwin
            arch: x64
            binary: secretbroker
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
            binary: secretbroker
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            arch: arm64
            binary: secretbroker
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            platform: win32
            arch: x64
            binary: secretbroker.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: dtolnay/rust-toolchain@1.100.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Stage npm platform package
        shell: bash
        run: |
          node scripts/stage-npm-platform.mjs \
            --binary "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --version "${{ needs.verify.outputs.version }}" \
            --out dist/npm
          mkdir -p dist/artifacts
          cd "dist/npm/secretbroker-${{ matrix.platform }}-${{ matrix.arch }}"
          npm pack --pack-destination ../../artifacts
      - name: Create Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p "dist/archive/secretbroker-${{ needs.verify.outputs.version }}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" README.md LICENSE "dist/archive/secretbroker-${{ needs.verify.outputs.version }}-${{ matrix.target }}/"
          tar -C dist/archive -czf "dist/artifacts/secretbroker-${{ needs.verify.outputs.version }}-${{ matrix.target }}.tar.gz" "secretbroker-${{ needs.verify.outputs.version }}-${{ matrix.target }}"
      - name: Create Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dir = "dist/archive/secretbroker-${{ needs.verify.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}", "README.md", "LICENSE" -Destination $dir
          Compress-Archive -Path $dir -DestinationPath "dist/artifacts/secretbroker-${{ needs.verify.outputs.version }}-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.target }}
          path: dist/artifacts/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    needs: [verify, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist/artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist/artifacts
        run: sha256sum * > SHA256SUMS
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.verify.outputs.tag }}" \
            --verify-tag \
            --generate-notes \
            --title "SecretBroker ${{ needs.verify.outputs.version }}" \
            dist/artifacts/*

  crates-io:
    name: Publish crates.io
    needs: [verify, github-release]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: dtolnay/rust-toolchain@1.100.0
      - run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm:
    name: Publish npm
    needs: [verify, build, github-release]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist/artifacts
          merge-multiple: true
      - name: Publish native packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for package in dist/artifacts/secretbroker-*-*-*.tgz; do
            npm publish "$package" --access public --provenance
          done
      - name: Publish launcher
        working-directory: packages/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm publish --access public --provenance
