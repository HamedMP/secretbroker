<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root { color-scheme: light dark; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 14px; background: transparent; color: CanvasText; }
    main { display: grid; gap: 12px; }
    header { display: flex; align-items: center; gap: 10px; }
    .mark { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 10px; background: linear-gradient(135deg, #38bdf8, #818cf8 55%, #c084fc); color: #07111f; font-weight: 800; }
    h1 { margin: 0; font-size: 16px; line-height: 1.2; }
    .subtitle, .notice { margin: 2px 0 0; color: color-mix(in srgb, CanvasText 66%, transparent); font-size: 12px; line-height: 1.45; }
    .variables { display: grid; gap: 7px; }
    .variable { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 9px 11px; border: 1px solid color-mix(in srgb, CanvasText 15%, transparent); border-radius: 10px; background: color-mix(in srgb, Canvas 94%, CanvasText 6%); }
    code { overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
    .state { flex: none; border-radius: 999px; padding: 3px 8px; font-size: 11px; font-weight: 650; background: color-mix(in srgb, #f59e0b 18%, transparent); color: #b45309; }
    .state.ready { background: color-mix(in srgb, #22c55e 18%, transparent); color: #15803d; }
    .state.expired, .state.failed { background: color-mix(in srgb, #ef4444 18%, transparent); color: #b91c1c; }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    button { appearance: none; border: 0; border-radius: 9px; padding: 8px 11px; font: inherit; font-size: 12px; font-weight: 650; cursor: pointer; background: #818cf8; color: #07111f; }
    button.secondary { background: color-mix(in srgb, CanvasText 10%, transparent); color: CanvasText; }
    button:disabled { cursor: default; opacity: .55; }
    .notice { padding-top: 2px; }
  </style>
</head>
<body>
<main>
  <header>
    <div class="mark" aria-hidden="true">SB</div>
    <div>
      <h1>Secure local input</h1>
      <p class="subtitle" id="summary">Opening a one-time browser form</p>
    </div>
  </header>
  <section class="variables" id="variables" aria-live="polite"></section>
  <div class="actions">
    <button id="retry" type="button">Open secure form</button>
    <button id="pin" class="secondary" type="button">Keep status visible</button>
  </div>
  <p class="notice">Enter values only in SecretBroker's separate localhost form. This panel receives names and readiness metadata, never credential values.</p>
</main>
<script>
  const variablesElement = document.getElementById("variables");
  const summaryElement = document.getElementById("summary");
  const retryButton = document.getElementById("retry");
  const pinButton = document.getElementById("pin");
  let output = window.openai?.toolOutput ?? {};
  let input = window.openai?.toolInput ?? {};
  let timer;

  function names() {
    return Array.isArray(output.variables)
      ? output.variables
      : Array.isArray(input.variables)
        ? input.variables.map((item) => typeof item === "string" ? item : item?.name).filter(Boolean)
        : [];
  }

  function stateFor(name) {
    if (output.available?.includes(name)) return "ready";
    if (output.expired?.includes(name)) return "expired";
    if (output.launchStatus === "failed") return "failed";
    return "pending";
  }

  function render() {
    const requested = names();
    variablesElement.replaceChildren(...requested.map((name) => {
      const row = document.createElement("div");
      row.className = "variable";
      const label = document.createElement("code");
      label.textContent = name;
      const state = document.createElement("span");
      const value = stateFor(name);
      state.className = `state ${value}`;
      state.textContent = value;
      row.append(label, state);
      return row;
    }));
    const ready = output.status === "ready";
    summaryElement.textContent = ready
      ? "All requested variables are ready"
      : output.launchStatus === "failed"
        ? "The secure form closed or could not open. Try again."
        : "Complete the separate one-time browser form";
    retryButton.textContent = ready ? "Replace securely" : "Open secure form";
    if (ready && timer) {
      clearInterval(timer);
      timer = undefined;
    }
  }

  async function refresh() {
    if (!window.openai?.callTool || names().length === 0) return;
    try {
      const result = await window.openai.callTool("secretbroker_status", {
        scope: output.scopeArgument ?? input.scope ?? "project",
        variables: names(),
      });
      if (result?.structuredContent) {
        output = result.structuredContent;
        render();
      }
    } catch {
      summaryElement.textContent = "Waiting for SecretBroker status";
    }
  }

  retryButton.addEventListener("click", async () => {
    if (!window.openai?.callTool) return;
    retryButton.disabled = true;
    try {
      const request = Object.keys(input).length > 0
        ? { ...input, replace: output.status === "ready" || input.replace === true }
        : {
            scope: output.scopeArgument ?? "project",
            variables: names().map((name) => ({ name })),
            replace: output.status === "ready",
          };
      const result = await window.openai.callTool("secretbroker_open", request);
      if (result?.structuredContent) output = result.structuredContent;
      render();
      if (!timer) timer = setInterval(refresh, 1500);
    } finally {
      retryButton.disabled = false;
    }
  });

  pinButton.addEventListener("click", async () => {
    await window.openai?.requestDisplayMode?.({ mode: "pip" });
  });

  window.addEventListener("openai:set_globals", (event) => {
    const globals = event.detail?.globals;
    if (globals?.toolOutput) output = globals.toolOutput;
    if (globals?.toolInput) input = globals.toolInput;
    render();
  }, { passive: true });

  render();
  timer = setInterval(refresh, 1500);
  refresh();
</script>
</body>
</html>
