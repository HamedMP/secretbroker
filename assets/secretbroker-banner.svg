<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">SecretBroker</title>
  <desc id="description">SecretBroker routes secrets to local commands without placing them in agent conversations.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#10172a"/>
      <stop offset="1" stop-color="#15112a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#94a3b8" stroke-opacity="0.055"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dy="10"/>
      <feColorMatrix values="0 0 0 0 0.02 0 0 0 0 0.04 0 0 0 0 0.12 0 0 0 .55 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="28" fill="url(#background)"/>
  <rect width="1280" height="640" rx="28" fill="url(#grid)"/>
  <ellipse cx="265" cy="320" rx="330" ry="330" fill="url(#glow)"/>
  <ellipse cx="1150" cy="80" rx="260" ry="260" fill="url(#glow)" opacity="0.45"/>

  <g transform="translate(96 180)" filter="url(#shadow)">
    <rect width="248" height="280" rx="48" fill="#0b1427" stroke="#334155" stroke-width="2"/>
    <path d="M124 36 200 64v70c0 55-32 91-76 111-44-20-76-56-76-111V64z" fill="url(#accent)" opacity="0.18" stroke="url(#accent)" stroke-width="5"/>
    <rect x="94" y="106" width="60" height="58" rx="13" fill="#0b1427" stroke="#e0e7ff" stroke-width="5"/>
    <path d="M106 106V92c0-24 36-24 36 0v14" fill="none" stroke="#e0e7ff" stroke-width="5" stroke-linecap="round"/>
    <circle cx="124" cy="133" r="6" fill="#38bdf8"/>
    <path d="m27 127 22 19-22 19M221 127l-22 19 22 19" fill="none" stroke="#7dd3fc" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="124" cy="221" r="5" fill="#c084fc"/>
    <circle cx="103" cy="221" r="5" fill="#818cf8"/>
    <circle cx="145" cy="221" r="5" fill="#38bdf8"/>
  </g>

  <g transform="translate(406 172)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="0" y="96" fill="#f8fafc" font-size="78" font-weight="750" letter-spacing="-3">SecretBroker</text>
    <rect x="3" y="123" width="612" height="5" rx="2.5" fill="url(#accent)"/>
    <text x="2" y="186" fill="#cbd5e1" font-size="30" font-weight="450">Keep secrets out of agent context.</text>
    <text x="2" y="231" fill="#94a3b8" font-size="22">Secure local input. Scoped command access. Native keychains.</text>

    <g transform="translate(2 278)" font-size="15" font-weight="700" letter-spacing="1.2">
      <g><rect width="138" height="42" rx="21" fill="#0c4a6e" stroke="#38bdf8" stroke-opacity=".45"/><text x="69" y="27" text-anchor="middle" fill="#bae6fd">LOCAL-FIRST</text></g>
      <g transform="translate(152)"><rect width="154" height="42" rx="21" fill="#312e81" stroke="#818cf8" stroke-opacity=".5"/><text x="77" y="27" text-anchor="middle" fill="#c7d2fe">OS KEYCHAINS</text></g>
      <g transform="translate(320)"><rect width="174" height="42" rx="21" fill="#581c87" stroke="#c084fc" stroke-opacity=".5"/><text x="87" y="27" text-anchor="middle" fill="#e9d5ff">ZERO TELEMETRY</text></g>
    </g>
  </g>

  <path d="M1188 520c-86 0-99 45-99 88" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity=".55"/>
  <circle cx="1188" cy="520" r="7" fill="#c084fc"/>
  <circle cx="1089" cy="608" r="7" fill="#38bdf8"/>
</svg>
